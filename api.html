<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema da Escola</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    padding: 40px 20px;
}

.container{
    max-width: 1000px;
    margin: auto;
}

h1{
    text-align: center;
    color: white;
    margin-bottom: 30px;
    font-size: 2.5rem;
}

.botoes{
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 30px;
}

button{
    background: white;
    color: #4f46e5;
    border: none;
    padding: 14px 25px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: .3s;
    box-shadow: 0 4px 10px rgba(0,0,0,.2);
}

button:hover{
    transform: translateY(-4px);
    background: #f3f4f6;
}

#resultado{
    background: white;
    border-radius: 20px;
    padding: 25px;
    min-height: 250px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.card{
    background: #f8fafc;
    border-left: 6px solid #4f46e5;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    transition: .3s;
}

.card:hover{
    transform: scale(1.02);
}

.card h2,
.card h3{
    color: #4f46e5;
    margin-bottom: 10px;
}

.card p{
    color: #444;
    margin: 5px 0;
}

@media(max-width:600px){

    h1{
        font-size: 2rem;
    }

    button{
        width: 100%;
    }

}

</style>

</head>
<body>

<div class="container">

    <h1>🏫 Sistema da Escola</h1>

    <div class="botoes">

        <button onclick="buscarAlunos()">
            👨‍🎓 Mostrar Alunos
        </button>

        <button onclick="buscarCursos()">
            📚 Mostrar Cursos
        </button>

        <button onclick="buscarProfessor()">
            👨‍🏫 Mostrar Professor
        </button>

    </div>

    <div id="resultado">
        Clique em um botão para buscar informações da escola.
    </div>

</div>

<script>

const resultado = document.querySelector("#resultado");

// ====================
// ALUNOS
// ====================

function buscarAlunos(){

    fetch("http://localhost:3000/alunos")
    .then(res => res.json())
    .then(dados => {

        resultado.innerHTML = "<h2>👨‍🎓 Alunos</h2><br>";

        dados.forEach(aluno => {

            resultado.innerHTML += `
                <div class="card">
                    <h3>${aluno.nome}</h3>
                    <p><strong>ID:</strong> ${aluno.id}</p>
                    <p><strong>Idade:</strong> ${aluno.idade} anos</p>
                </div>
            `;

        });

    })
    .catch(() => {
        resultado.innerHTML = `
            <div class="card">
                <h3>Erro</h3>
                <p>Não foi possível carregar os alunos.</p>
            </div>
        `;
    });

}

// ====================
// CURSOS
// ====================

function buscarCursos(){

    fetch("http://localhost:3000/cursos")
    .then(res => res.json())
    .then(dados => {

        resultado.innerHTML = "<h2>📚 Cursos</h2><br>";

        dados.forEach(curso => {

            resultado.innerHTML += `
                <div class="card">
                    <h3>${curso.curso}</h3>
                    <p><strong>ID:</strong> ${curso.id}</p>
                </div>
            `;

        });

    })
    .catch(() => {
        resultado.innerHTML = `
            <div class="card">
                <h3>Erro</h3>
                <p>Não foi possível carregar os cursos.</p>
            </div>
        `;
    });

}

// ====================
// PROFESSOR
// ====================

function buscarProfessor(){

    fetch("http://localhost:3000/professor")
    .then(res => res.json())
    .then(dados => {

        resultado.innerHTML = `
            <h2>👨‍🏫 Professor</h2><br>

            <div class="card">
                <h3>${dados.nome}</h3>
                <p><strong>Disciplina:</strong> ${dados.disciplina}</p>
            </div>
        `;

    })
    .catch(() => {
        resultado.innerHTML = `
            <div class="card">
                <h3>Erro</h3>
                <p>Não foi possível carregar os dados do professor.</p>
            </div>
        `;
    });

}

</script>

</body>
</html>
