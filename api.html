<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>API Escola</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

h1{
    text-align: center;
}

.botoes{
    text-align: center;
    margin-bottom: 20px;
}

button{
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}

#resultado{
    background: #f4f4f4;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 20px;
    min-height: 200px;
}

.card{
    background: white;
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
}

</style>

</head>
<body>

<h1>🏫 Sistema da Escola</h1>

<div class="botoes">

    <button onclick="buscarAlunos()">
        Mostrar Alunos
    </button>

    <button onclick="buscarCursos()">
        Mostrar Cursos
    </button>

    <button onclick="buscarProfessor()">
        Mostrar Professor
    </button>

</div>

<div id="resultado">
    Clique em um botão para buscar dados.
</div>

<script>

const resultado = document.querySelector("#resultado");

// ====================
// ALUNOS
// ====================

function buscarAlunos(){

    fetch("http://localhost:3000/alunos")
    .then(res => res.json())
    .then(dados => {

        resultado.innerHTML = "";

        dados.forEach(aluno => {

            resultado.innerHTML += `
                <div class="card">
                    <h3>${aluno.nome}</h3>
                    <p>ID: ${aluno.id}</p>
                    <p>Idade: ${aluno.idade}</p>
                </div>
            `;

        });

    });

}

// ====================
// CURSOS
// ====================

function buscarCursos(){

    fetch("http://localhost:3000/cursos")
    .then(res => res.json())
    .then(dados => {

        resultado.innerHTML = "";

        dados.forEach(curso => {

            resultado.innerHTML += `
                <div class="card">
                    <h3>${curso.curso}</h3>
                    <p>ID: ${curso.id}</p>
                </div>
            `;

        });

    });

}

// ====================
// PROFESSOR
// ====================

function buscarProfessor(){

    fetch("http://localhost:3000/professor")
    .then(res => res.json())
    .then(dados => {

        resultado.innerHTML = `
            <div class="card">
                <h2>${dados.nome}</h2>
                <p>Disciplina: ${dados.disciplina}</p>
            </div>
        `;

    });

}

</script>

</body>
</html>
